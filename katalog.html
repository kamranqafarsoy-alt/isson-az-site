       <script src="script.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://qcnkjmnywapgnkbttznv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjbmtqbW55d2FwZ25rYnR0em52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDE3NDEsImV4cCI6MjA5NTAxNzc0MX0.fYZ-ectEYZ5RnHraTn1IsiB2OA8sks-JcnUJ6grXHzQ'
)
const kataloqKonteyner = document.getElementById('umumi-kataloq')

async function loadCatalog() {

  const { data, error } = await supabase
    .from('products')
    .select('*')
    .order('id', { ascending: false })

  if (error) {
    console.error(error)
    kataloqKonteyner.innerHTML = '<p>Xəta baş verdi</p>'
    return
  }

  kataloqKonteyner.innerHTML = ''

  if (!data || data.length === 0) {
    kataloqKonteyner.innerHTML = '<p>Məhsul tapılmadı</p>'
    return
  }

  data.forEach(product => {

    const card = document.createElement('div')

    card.className = 'product-card'

   card.innerHTML = `
  <img
    src="${product.image_url || product.image || 'images/no-image.jpg'}"
    alt="${product.title || product.name}"
  >

  <div class="product-overlay">
    <h3>${product.title || product.name}</h3>

    <p>${product.price} ₼</p>

    <a href="#" class="btn btn-gold">
      Ətraflı
    </a>
  </div>
`

    kataloqKonteyner.appendChild(card)

  })
}

loadCatalog()
</script>
