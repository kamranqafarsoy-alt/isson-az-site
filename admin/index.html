<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isson Group - Admin Panel</title>
    <!-- Giriş tənzimləmələrini daxildən oxumaq üçün xüsusi skript -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <!-- Decap CMS Core Application -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // CMS-i rəsmi manual üsulla başladırıq
      if (typeof window.CMS !== 'undefined') {
        window.CMS.init({
          config: {
            backend: {
              name: "github",
              repo: "kamranqafarsoy-alt/isson-az-site",
              branch: "main",
              base_url: "https://cms-oauth-provider.vercel.app"
            },
            media_folder: "images",
            public_folder: "images",
            collections: [
              {
                name: "products",
                label: "Bütün Məhsullar",
                folder: "images",
                create: true,
                slug: "product-{{fields.id}}",
                fields: [
                  { label: "Məhsul ID (Ardıcıl rəqəm)", name: "id", widget: "number" },
                  { 
                    label: "Məhsulun Kateqoriyası", 
                    name: "category", 
                    widget: "string",
                    hint: "Bura hansı bölməyə aid olduğunu yazın (Məsələn: Moydadır, Kombi, Qapı, Kafel, Laminat)"
                  },
                  { label: "Məhsul Şəkli", name: "image", widget: "image" }
                ]
              }
            ]
          }
        });
      }
    </script>
  </body>
</html>
