<!DOCTYPE html>

<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISSON Admin Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0f14;
    font-family:Arial,sans-serif;
}

.login-box{
    width:400px;
    background:#111827;
    padding:40px;
    border-radius:20px;
    border:1px solid rgba(191,161,117,.2);
}

h2{
    text-align:center;
    color:#d7b98c;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#d7b98c;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    text-align:center;
    color:#ff6b6b;
}
</style>

</head>

<body>

<div class="login-box">

<h2>ISSON ADMIN</h2>

<input type="text" id="username" placeholder="İstifadəçi adı">

<input type="password" id="password" placeholder="Şifrə">

<button onclick="login()">
Daxil ol
</button>

<div id="error"></div>

</div>

<script type="module">

import { supabase } from "../js/supabase.js";

window.login = async function(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const errorBox =
        document.getElementById("error");

    const { data, error } = await supabase
        .from("admins")
        .select("*")
        .eq("username", username)
        .eq("password", password)
        .single();

    if(error || !data){

        errorBox.innerHTML =
            "İstifadəçi adı və ya şifrə yanlışdır";

        return;
    }

    localStorage.setItem(
        "isson_admin",
        "true"
    );

    window.location.href =
        "dashboard.html";
}
</script>

</body>
</html>
