<!DOCTYPE html>

<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISSON Admin Panel</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0b0f14;
    color:white;
    padding:40px;
}

.box{
    max-width:700px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:15px;
}

h2{
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #333;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#c9a86a;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#result{
    margin-top:15px;
}

.product{
    margin-top:15px;
    padding:15px;
    border:1px solid #333;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>ISSON Admin Panel</h2>

<input type="text" id="title" placeholder="Məhsul adı">

<input type="text" id="price" placeholder="Qiymət">

<select id="category">
    <option value="kombi">Kombi</option>
    <option value="kondisioner">Kondisioner</option>
    <option value="laminat">Laminat</option>
    <option value="qapi">Qapı</option>
    <option value="moydadir">Moydadır</option>
    <option value="seyfqapilar">Seyf Qapı</option>
</select>

<input type="text" id="image" placeholder="Şəkil yolu (məs: images/kombi/kombi- (1).jpg)">

<button onclick="addProduct()">
Məhsul əlavə et
</button>

<div id="result"></div>

<h3 style="margin-top:40px">Məhsullar</h3>

<div id="products"></div>

</div>

<script type="module">

import { supabase } from "../js/supabase.js";

async function loadProducts(){

    const list=document.getElementById("products");

    const {data,error}=await supabase
    .from("products")
    .select("*")
    .order("id",{ascending:false});

    if(error) return;

    list.innerHTML="";

    data.forEach(item=>{

      list.innerHTML+=`
<div class="product">
    <strong>${item.title || item.name}</strong><br>
    ${item.price} ₼<br>
    ${item.category || "-"}<br><br>

    <button onclick="editProduct(${item.id})"
        style="width:auto;padding:8px 15px;margin-right:10px;">
        Redaktə et
    </button>

    <button onclick="deleteProduct(${item.id})"
        style="width:auto;padding:8px 15px;background:#c0392b;color:white;">
        Sil
    </button>
</div>
`;
    });
}

window.addProduct=async function(){

    const title=document.getElementById("title").value;
    const price=document.getElementById("price").value;
    const image=document.getElementById("image").value;
    const category=document.getElementById("category").value;

    const result=document.getElementById("result");

    const {error}=await supabase
    .from("products")
    .insert([{
        name:title,
        title:title,
        price:price,
        image:image,
        image_url:image,
        category:category
    }]);

    if(error){

        result.innerHTML="Xəta: "+error.message;
        result.style.color="red";

    }else{

        result.innerHTML="Məhsul əlavə edildi";
        result.style.color="lightgreen";

        loadProducts();
    }
}

loadProducts();
window.deleteProduct = async function(id){

    if(!confirm("Məhsul silinsin?")) return;

    const { error } = await supabase
        .from("products")
        .delete()
        .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    loadProducts();
}

window.editProduct = async function(id){

    const yeniAd = prompt("Yeni məhsul adı:");

    if(!yeniAd) return;

    const { error } = await supabase
        .from("products")
        .update({
            title: yeniAd,
            name: yeniAd
        })
        .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    loadProducts();
}
</script>

</body>
</html>
