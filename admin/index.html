<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISSON Admin Panel</title>

  <style>

    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .box{
      max-width:500px;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      background:black;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    #result{
      margin-top:20px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="box">

    <h2>ISSON Admin Panel</h2>

    <input type="text" id="title" placeholder="Məhsul adı">

    <input type="text" id="price" placeholder="Qiymət">

    <input type="text" id="image" placeholder="Şəkil adı">

    <button onclick="addProduct()">
      Məhsul əlavə et
    </button>

    <div id="result"></div>

  </div>

  <script type="module">

    import { supabase } from "../js/supabase.js";

    window.addProduct = async function () {

      const title = document.getElementById("title").value;

      const price = document.getElementById("price").value;

      const image = document.getElementById("image").value;

      const result = document.getElementById("result");

      const { data, error } = await supabase
        .from("products")
        .insert([
  {
    name: title,
    title: title,
    price: price,
    image: image,
    image_url: image
  }
])
      
        .select();

      if (error) {

        result.innerHTML = "Xəta: " + error.message;
        result.style.color = "red";

        console.log(error);

      } else {

        result.innerHTML = "Məhsul uğurla əlavə edildi";
        result.style.color = "green";

        console.log(data);

      }

    };

  </script>

</body>
</html>
